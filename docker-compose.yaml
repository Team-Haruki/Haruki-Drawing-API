version: '3.8'

services:
  haruki-drawing-api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: haruki-drawing-api
    ports:
      - "28000:8000"
    environment:
      - GRANIAN_WORKERS=1
      - GRANIAN_WORKERS_LIFETIME=1200
      - GRANIAN_WORKERS_KILL_TIMEOUT=30
      - MALLOC_ARENA_MAX=2
      - MALLOC_TRIM_THRESHOLD_=131072
    volumes:
      # 当前约定的素材根目录为 Windows 主机上的 Z:\pjskdata\Data，
      # 容器内统一挂载为 /pjskdata/Data。
      - "./data:/pjskdata/Data"
      - "./configs.docker.yaml:/app/haruki_drawing_api/configs.yaml"
      # 挂载真实的 drawer.py 以替换占位文件（开源版本不包含真实实现）：
      # - "/path/to/real/drawer.py:/app/haruki_drawing_api/src/sekai/mysekai/drawer.py"
    restart: always
    deploy:
      resources:
        limits:
          # 实测(OrbStack, linux/glibc, 镜像内): 空转 cgroup 588MB(app 267 + 4 个 heavy worker),
          # card/box 12 并发峰值 1182MB, 混合负载(12×card/box + 8×deck/recommend, 10 并发)峰值 2005MB。
          # 4G 给峰值留了约 2 倍余量。2G 撑不住 —— 光 heavy worker 暖起来就能到 2.5GB。
          #
          # 这个 memory 限额同时是 readiness_unhealthy_cgroup_percent 的分母:不设限额时容器的
          # memory.max 读作 "max",read_cgroup_memory() 返回 None,那道门就永远不会触发。
          cpus: '4'
          memory: 4G
        reservations:
          cpus: '0.5'
          memory: 512M
