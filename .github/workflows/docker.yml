name: Build Docker Image

on:
  push:
    tags:
      - "v*"

jobs:
  docker:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Install skia-safe link dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends libfontconfig1-dev libfreetype6-dev

      - name: Setup free-threaded Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.14t"

      - name: Setup Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Rust build cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: rust/haruki_skia_renderer
          shared-key: skia-renderer
          # tag builds cannot save branch-scoped caches usefully; they restore
          # the shared cache saved by skia-wheels.yml runs on main
          save-if: ${{ false }}

      # D2: the wheel is never published to an index; it is built here and placed
      # into the build context so the Dockerfile installs it into the app venv.
      # If this step were removed the image build would still succeed (fail-open,
      # the runtime would fall back to Pillow rendering).
      - name: Build haruki_skia_renderer wheel into build context
        run: |
          pip install maturin
          maturin build --release --manifest-path rust/haruki_skia_renderer/Cargo.toml -o docker/skia-wheels
          ls -l docker/skia-wheels

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # A pre-release (v3.0.0-rc1, v2.9.0-beta.2, ...) must NOT move `:latest`. Anything deploying
      # `:latest` would silently pick up the release candidate, which is the one thing an RC is
      # supposed not to be. Only a plain vX.Y.Z tag is allowed to claim it.
      - name: Decide whether this tag claims :latest
        id: tags
        run: |
          IMAGE_NAME=ghcr.io/$(echo ${{ github.repository }} | tr '[:upper:]' '[:lower:]')
          VERSION=${{ github.ref_name }}
          echo "image=$IMAGE_NAME" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          if [[ "$VERSION" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "is_prerelease=false" >> "$GITHUB_OUTPUT"
            echo "$VERSION is a stable release — it will also be pushed as :latest"
          else
            echo "is_prerelease=true" >> "$GITHUB_OUTPUT"
            echo "$VERSION is a pre-release — :latest will NOT be moved"
          fi

      - name: Build Docker image
        run: |
          IMAGE_NAME=${{ steps.tags.outputs.image }}
          VERSION=${{ steps.tags.outputs.version }}
          TAGS="-t $IMAGE_NAME:$VERSION"
          if [[ "${{ steps.tags.outputs.is_prerelease }}" == "false" ]]; then
            TAGS="$TAGS -t $IMAGE_NAME:latest"
          fi
          docker build \
            --build-arg VERSION="$VERSION" \
            --build-arg GIT_SHA="${GITHUB_SHA}" \
            --build-arg BUILD_DATE="$(date -u +'%Y-%m-%dT%H:%M:%SZ')" \
            $TAGS .

      - name: Push Docker image
        run: |
          IMAGE_NAME=${{ steps.tags.outputs.image }}
          VERSION=${{ steps.tags.outputs.version }}
          docker push $IMAGE_NAME:$VERSION
          if [[ "${{ steps.tags.outputs.is_prerelease }}" == "false" ]]; then
            docker push $IMAGE_NAME:latest
          else
            echo "pre-release: skipping :latest"
          fi
