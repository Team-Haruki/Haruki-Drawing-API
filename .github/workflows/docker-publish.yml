name: Docker Build & Publish

on:
  push:
    branches:
      - main
    tags:
      - "v*.*.*"
  release:
    types: [published]
  workflow_dispatch:

jobs:
  build-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute image tags
        id: tags
        run: |
          IMAGE="ghcr.io/$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')"
          echo "image=${IMAGE}" >> "$GITHUB_OUTPUT"

          if [[ "${{ github.ref_type }}" == "tag" ]]; then
            VER="${{ github.ref_name }}"
          elif [[ "${{ github.event_name }}" == "release" ]]; then
            VER="${{ github.event.release.tag_name }}"
          else
            VER=""
          fi

          if [[ -n "$VER" ]]; then
            VER_CLEAN="${VER#v}"
            echo "tags=${IMAGE}:${VER_CLEAN},${IMAGE}:latest" >> "$GITHUB_OUTPUT"
          else
            SHORT_SHA="${GITHUB_SHA:0:7}"
            echo "tags=${IMAGE}:latest,${IMAGE}:sha-${SHORT_SHA}" >> "$GITHUB_OUTPUT"
          fi

      - name: Build
        run: |
          IFS=',' read -ra TAGS <<< "${{ steps.tags.outputs.tags }}"
          TAG_ARGS=""
          for t in "${TAGS[@]}"; do TAG_ARGS="$TAG_ARGS -t $t"; done
          docker build $TAG_ARGS .

      - name: Push
        run: |
          IFS=',' read -ra TAGS <<< "${{ steps.tags.outputs.tags }}"
          for t in "${TAGS[@]}"; do
            docker push "$t"
          done
