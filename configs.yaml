assets:
  base_dir: ./data
  result_asset_path: static_images
  tmp_path: tmp
  tri_paths:
    - ./data/static_images/triangle/tri1.png
    - ./data/static_images/triangle/tri2.png
    - ./data/static_images/triangle/tri3.png

font:
  dir: ./data
  default: 
    default: SourceHanSansSC-Regular
    bold: SourceHanSansSC-Bold
    heavy: SourceHanSansSC-Heavy
    emoji: TwitterColorEmoji-SVGinOT  # macOS 开发机:CoreText 后端渲染 OT-SVG 彩色(COLR 在 mac scaler 下是空白);Linux 生产用 TwemojiMozilla(见 configs.docker.yaml)

drawing:
  thread_pool_size: 8
  isolated_worker_pool_size: 4  # 跟 CPU 配额走:实测 4 个的 p50 和吞吐都优于 8 个(超订反而更慢)
  isolated_worker_queue_limit: 16
  isolated_worker_queue_timeout_seconds: 30
  request_hard_timeout_seconds: 180
  overload_max_inflight_requests: 64
  overload_retry_after_seconds: 5
  readiness_unhealthy_inflight_requests: 48
  readiness_unhealthy_rss_mb: 1536  # 只看父进程 RSS(实测峰值 ~765MB);必须低于容器硬限额才有意义
  readiness_unhealthy_asyncio_tasks: 256
  image_cache_size: 1024
  image_cache_max_mb: 256
  thumbnail_cache_size: 2048
  thumbnail_cache_max_mb: 256
  composed_image_cache_size: 2048
  composed_image_cache_max_mb: 256
  composed_image_cache_ttl_seconds: 604800
  screenshot_api_path: http://localhost:28080/screenshot
  export_image_format: png  # png 或 jpg
  jpg_quality: 85  # JPEG 压缩质量 (1-100)，仅在 export_image_format 为 jpg 时生效
  custom_profile_assets_dir: data/asset/{region}-assets/startapp/custom_profile
  custom_profile_fonts_dir: data/asset/{region}-assets/startapp/custom_profile/font
  custom_profile_tmp_font_metadata: data/custom_profile/tmp-font-assets/{region}/metadata.json
  custom_profile_shape_sprite_dir: data/asset/{region}-assets/startapp/custom_profile/shape
  custom_profile_unity_ui_sprite_dir: data/drawing/static_images/customprofile
  custom_profile_parallel_workers: 1

server:
  host: 0.0.0.0
  port: 28000

logging:
  level: INFO
  format: "[%(asctime)s][%(levelname)s][%(name)s] %(message)s"
  field_styles:
    asctime:
      color: green
    levelname:
      color: blue
      bold: true
    name:
      color: magenta
    message:
      color: 144
      bright: false
