assets:
  base_dir: /pjskdata/Data
  result_asset_path: static_images
  tmp_path: tmp
  tri_paths:
    - /pjskdata/Data/static_images/triangle/tri1.png
    - /pjskdata/Data/static_images/triangle/tri2.png
    - /pjskdata/Data/static_images/triangle/tri3.png

font:
  dir: /pjskdata/Data/fonts
  default: 
    default: SourceHanSansSC-Regular
    bold: SourceHanSansSC-Bold
    heavy: SourceHanSansSC-Heavy
    emoji: TwemojiMozilla  # Linux/FreeType 后端:COLR 原生彩色(SVGinOT 只出单色回退);字体文件 TwemojiMozilla.ttf 需在数据卷 font.dir 下

drawing:
  thread_pool_size: 8
  isolated_worker_pool_size: 4  # 跟 CPU 配额走:实测 4 个的 p50 和吞吐都优于 8 个(超订反而更慢)
  isolated_worker_queue_limit: 16
  isolated_worker_queue_timeout_seconds: 30
  request_hard_timeout_seconds: 180
  overload_max_inflight_requests: 64
  overload_retry_after_seconds: 5
  readiness_unhealthy_inflight_requests: 48
  # 关掉:它只看父进程 VmRSS,看不见 heavy worker(内存主项),而父进程 RSS 是随并发线性涨的
  # (实测 1/4/8/12 并发 = 483/757/838/958 MB),所以它本质是一道校准错了的"并发门"——
  # 1536 会在并发 ~26 触发,抢在真正的并发门(inflight 48)前面开火。内存交给 cgroup 门。
  readiness_unhealthy_rss_mb: 0
  readiness_unhealthy_asyncio_tasks: 256
  # 容器内存用量达到硬限额的 90% 时 /ready 报 503。这是唯一能看见 heavy worker 的信号。
  # 不在受限 cgroup 里(裸机/macOS/无限额容器)时自动失效,不猜。
  readiness_unhealthy_cgroup_percent: 90
  image_cache_size: 1024
  image_cache_max_mb: 256
  thumbnail_cache_size: 2048
  thumbnail_cache_max_mb: 256
  composed_image_cache_size: 2048
  composed_image_cache_max_mb: 256
  composed_image_cache_ttl_seconds: 604800
  export_image_format: png  # png 或 jpg
  jpg_quality: 85  # JPEG 压缩质量 (1-100)，仅在 export_image_format 为 jpg 时生效
  custom_profile_assets_dir: /pjskdata/Data/asset/{region}-assets/startapp/custom_profile
  custom_profile_fonts_dir: /pjskdata/Data/asset/{region}-assets/startapp/custom_profile/font
  custom_profile_tmp_font_metadata: /pjskdata/Data/custom_profile/tmp-font-assets/{region}/metadata.json
  custom_profile_shape_sprite_dir: /pjskdata/Data/asset/{region}-assets/startapp/custom_profile/shape
  custom_profile_unity_ui_sprite_dir: /pjskdata/Data/static_images/customprofile
  custom_profile_parallel_workers: 1

server:
  host: 0.0.0.0
  port: 28000

logging:
  level: INFO
  format: "[%(asctime)s][%(levelname)s][%(name)s] %(message)s"
  field_styles:
    asctime:
      color: green
    levelname:
      color: blue
      bold: true
    name:
      color: magenta
    message:
      color: 144
      bright: false
